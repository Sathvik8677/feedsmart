<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FeedSmart — Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#faf8f3;--dark:#1a1a2e;--green:#2ecc71;--green2:#27ae60;--card:#ffffff;--muted:#7f8c8d;--border:#e8e3d8;--red:#e74c3c}

body{
  font-family:'Outfit',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Background */
.bg-art{
  position:fixed;
  inset:0;
  z-index:0;
}
.bg-art::before{
  content:'';
  position:absolute;
  top:-20%;
  right:-10%;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(46,204,113,.12),transparent);
}

/* Wrapper */
.wrap{
  z-index:1;
  width:100%;
  max-width:420px;
}

/* Card */
.card{
  background:#fff;
  padding:35px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  animation:slideUp 0.5s ease;
}

/* Animation */
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* Brand */
.brand{
  text-align:center;
  margin-bottom:25px;
}

.brand h1{
  font-family:'Playfair Display';
}

.brand p{
  color:var(--muted);
}

/* Form */
.fg{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:2px solid var(--border);
  transition:0.2s;
}

input:focus{
  border-color:var(--green);
  outline:none;
}

/* Button */
.btn{
  width:100%;
  padding:13px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

/* Password strength */
.strength{
  font-size:0.8rem;
  margin-top:5px;
}

/* Alerts */
.ale{
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}
.ale-error{background:#ffe5e5;color:red}
.ale-success{background:#e6fff2;color:green}

/* Link */
.lnk{
  text-align:center;
  margin-top:15px;
}
.lnk a{
  color:var(--green);
  text-decoration:none;
}
</style>
</head>

<body>

<div class="bg-art"></div>

<div class="wrap">

  <div class="brand">
    <h1>FeedSmart</h1>
    <p>Set your new password 🔐</p>
  </div>

  <div class="card">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in messages %}
        <div class="ale ale-{{cat}}">
          {{msg}}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST">

      <div class="fg">
        <input type="text" name="otp" placeholder="Enter OTP" required>
      </div>

      <div class="fg">
        <input type="password" name="password" id="pwd" placeholder="New Password" required>
        <div class="strength" id="strengthText"></div>
      </div>

      <button class="btn">🔑 Reset Password</button>

    </form>

    <div class="lnk">
      <a href="/login">← Back to Login</a>
    </div>

  </div>

</div>

<script>
/* Password strength */
document.getElementById("pwd").addEventListener("input", function(){
  let val = this.value;
  let text = document.getElementById("strengthText");

  if(val.length < 4){
    text.innerHTML = "Weak ❌";
    text.style.color = "red";
  } else if(val.length < 7){
    text.innerHTML = "Medium ⚠️";
    text.style.color = "orange";
  } else {
    text.innerHTML = "Strong ✅";
    text.style.color = "green";
  }
});

/* Button loading */
document.querySelector("form").addEventListener("submit", function(){
  let btn = document.querySelector(".btn");
  btn.innerHTML = "Updating...";
  btn.disabled = true;
});
</script>

</body>
</html>
